services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mise-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: mise-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
